name: Staging Environment Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-environment-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  STAGING_APP_URL: ${{ secrets.STAGING_APP_URL }}
  STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
  STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
  STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
  STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT || 22 }}
  STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}

jobs:
  pipeline:
    name: Build, test, lint, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend source
        working-directory: frontend
        run: npm run build

      - name: Run backend unit tests
        working-directory: backend
        run: npm test

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Package deployment artifacts
        run: |
          tar --exclude='backend/node_modules' \
              --exclude='backend/.env' \
              --exclude='frontend/node_modules' \
              --exclude='frontend/.env' \
              -czf deployment.tar.gz backend frontend/dist schema.sql

      - name: Prepare SSH access
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${STAGING_SSH_KEY}" > "$HOME/.ssh/staging_key"
          chmod 600 "$HOME/.ssh/staging_key"
          ssh-keyscan -p "$STAGING_SSH_PORT" -H "$STAGING_SSH_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Create remote deploy directory
        run: |
          ssh -i "$HOME/.ssh/staging_key" -p "$STAGING_SSH_PORT" "$STAGING_SSH_USER@$STAGING_SSH_HOST" "mkdir -p '$STAGING_DEPLOY_PATH'"

      - name: Upload deployment archive
        run: |
          scp -i "$HOME/.ssh/staging_key" -P "$STAGING_SSH_PORT" deployment.tar.gz "$STAGING_SSH_USER@$STAGING_SSH_HOST:$STAGING_DEPLOY_PATH/deployment.tar.gz"

      - name: Deploy to AWS staging server
        run: |
          ssh -i "$HOME/.ssh/staging_key" -p "$STAGING_SSH_PORT" "$STAGING_SSH_USER@$STAGING_SSH_HOST" "set -e; cd '$STAGING_DEPLOY_PATH'; tar -xzf deployment.tar.gz; cd backend; npm ci --omit=dev; pkill -f 'node index.js' || true; nohup npm start > app.log 2>&1 &"

  notify_success:
    name: Email QA on success
    needs: pipeline
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Send success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Staging deployment succeeded for ${{ github.repository }}
          to: ${{ secrets.QA_EMAIL }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            The staging workflow completed successfully.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Access the app here: ${{ env.STAGING_APP_URL }}

  notify_failure:
    name: Email developer on failure
    needs: pipeline
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Staging deployment failed for ${{ github.repository }}
          to: ${{ secrets.DEV_EMAIL }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            The staging workflow failed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
